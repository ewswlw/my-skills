# ShinkaEvolve default config — Gemini-only, Windows-friendly
# Copy to your task directory and pass via: shinka_run --config-fname shinka.yaml

evo:
  num_generations: 50
  language: python
  init_program_path: initial.py
  llm_models:
    - gemini-2.5-flash-preview
    - gemini-2.5-pro-preview
  llm_dynamic_selection: ucb
  llm_kwargs:
    temperatures: [0.0, 0.5, 1.0]
    max_tokens: 16384
  embedding_model: null
  max_api_costs: 5.0
  patch_types: ["diff", "full", "cross"]
  patch_type_probs: [0.6, 0.3, 0.1]
  meta_rec_interval: 10
  meta_llm_models:
    - gemini-2.5-flash-preview
  use_text_feedback: false

db:
  num_islands: 2
  archive_size: 40
  elite_selection_ratio: 0.3
  migration_interval: 10

job:
  type: local

max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 4
